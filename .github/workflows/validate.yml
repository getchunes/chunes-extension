name: Validate extension

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Validate source
        shell: pwsh
        run: ./scripts/validate.ps1

      - name: Build deterministic upload package
        shell: pwsh
        run: ./scripts/package.ps1

      - name: Inspect upload package
        shell: pwsh
        run: ./scripts/validate-package.ps1
