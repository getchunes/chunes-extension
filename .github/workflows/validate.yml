name: Validate extension

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate source
        shell: pwsh
        run: ./scripts/validate.ps1

      - name: Build deterministic upload package
        shell: pwsh
        run: ./scripts/package.ps1

      - name: Inspect upload package
        shell: pwsh
        run: ./scripts/validate-package.ps1
